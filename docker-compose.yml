services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333" # Porta per API REST e Dashboard UI
      - "6334:6334" # Porta per gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__ANALYTICS_ENABLED=true # telemetria